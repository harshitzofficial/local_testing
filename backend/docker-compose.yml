x-judge0-default-config: &default-config
  image: judge0/judge0:1.13.1
  volumes:
    - ./judge0.conf:/judge0.conf:ro
  restart: always

services:
  # 1. Judge0 Database
  postgres:
    image: postgres:13
    env_file: judge0.conf
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. Judge0 Queue
  redis:
    image: redis:6.0
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: judge0.conf
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  # 3. Judge0 API Server
  judge0-server:
    <<: *default-config
    ports:
      - "2358:2358"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  # 4. Judge0 Execution Worker
  judge0-worker:
    <<: *default-config
    command: ["./scripts/workers"]
    privileged: true
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  # 5. Your Code Arena Backend (NOW WITH HOT RELOAD)
  backend:
    build: .
    ports:
      - "3000:3000"
    # --- HOT RELOAD CONFIG START ---
    volumes:
      - .:/app                # Links your current folder to the container
      - /app/node_modules     # Keeps container's modules separate from host
    command: npm run dev      # Tells Docker to use your 'dev' script (nodemon)
    # --- HOT RELOAD CONFIG END ---
    env_file: 
      - ./.env
      - ./judge0.conf
    environment:
      - JUDGE0_URL=http://judge0-server:2358
    depends_on:
      judge0-server:
        condition: service_started

volumes:
  postgres-data:
  redis-data: