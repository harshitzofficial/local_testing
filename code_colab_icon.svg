<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Left bracket < -->
  <polyline points="34,32 20,50 34,68"
    fill="none" stroke="url(#accent)" stroke-width="7"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right bracket > -->
  <polyline points="66,32 80,50 66,68"
    fill="none" stroke="url(#accent)" stroke-width="7"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Two cursors (blinking bars) inside — representing two collaborators -->
  <rect x="43" y="38" width="4" height="14" rx="2" fill="url(#green)" opacity="0.95"/>
  <rect x="53" y="48" width="4" height="14" rx="2" fill="#f472b6" opacity="0.85"/>
</svg>